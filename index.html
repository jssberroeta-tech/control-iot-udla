<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control IoT - Jesús Berroeta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a2e; color: white; padding-top: 50px; }
        .card { background: #16213e; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #e94560; }
        .btn { padding: 15px 30px; font-size: 16px; margin: 10px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; width: 130px; }
        .on { background: #27ae60; color: white; }
        .off { background: #c0392b; color: white; }
        #status { color: #f1c40f; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Panel de Control ESP32</h1>
        <div id="status">Estado: Desconectado</div>
        
        <h3>LED 1 (GPIO 18)</h3>
        <button class="btn on" onclick="enviar('led1_on')">ENCENDER</button>
        <button class="btn off" onclick="enviar('led1_off')">APAGAR</button>

        <h3>LED 2 (GPIO 23)</h3>
        <button class="btn on" onclick="enviar('led2_on')">ENCENDER</button>
        <button class="btn off" onclick="enviar('led2_off')">APAGAR</button>
    </div>

    <script>
        // CONFIGURACIÓN (REEMPLAZA CON TUS DATOS)
        const broker = "15aee4ce7ff046d69f5f4fb4d2901c92.s1.eu.hivemq.cloud";
        const port = 8884; 
        const user = "jesus+"; 
        const pass = "Jesu#42006";
        const topic = "udla/jesus/control"; // Mismo que en Arduino

        const client = new Paho.MQTT.Client("wss://" + broker + ":" + port + "/mqtt", "web_client_" + Math.random());

        const options = {
            useSSL: true,
            userName: user,
            password: pass,
            onSuccess: () => {
                document.getElementById("status").innerHTML = "Estado: Conectado a HiveMQ";
                document.getElementById("status").style.color = "#2ecc71";
            },
            onFailure: (e) => {
                document.getElementById("status").innerHTML = "Error de conexión: " + e.errorMessage;
            }
        };

        client.connect(options);

        function enviar(comando) {
            const payload = JSON.stringify({ cmd: comando });
            const message = new Paho.MQTT.Message(payload);
            message.destinationName = topic;
            client.send(message);
            console.log("Enviado: " + payload);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control IoT - Jesús Berroeta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #2c3e50; color: white; }
        .container { margin-top: 50px; background: #34495e; display: inline-block; padding: 30px; border-radius: 15px; }
        .btn { padding: 15px 30px; font-size: 16px; margin: 10px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .on { background: #27ae60; color: white; }
        .off { background: #c0392b; color: white; }
        .on:hover { background: #2ecc71; }
        #status { color: #f1c40f; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Panel de Control UDLA</h1>
        <div id="status">Estado: Desconectado</div>
        
        <h3>LED 1 (Pin 18)</h3>
        <button class="btn on" onclick="enviar('led1_on')">ENCENDER</button>
        <button class="btn off" onclick="enviar('led1_off')">APAGAR</button>

        <h3>LED 2 (Pin 23)</h3>
        <button class="btn on" onclick="enviar('led2_on')">ENCENDER</button>
        <button class="btn off" onclick="enviar('led2_off')">APAGAR</button>
    </div>

    <script>
        // CONFIGURAR AQUÍ
        const broker = "15aee4ce7ff046d69f5f4fb4d2901c92.s1.eu.hivemq.cloud"; // El mismo del ESP32
        const port = 8884; 
        const user = "jesus+";
        const pass = "Jesu#42006";
        const topic = "udla/iot/grupoX/cmd";

        const client = new Paho.MQTT.Client("wss://" + broker + ":" + port + "/mqtt", "web_client_" + Math.random());

        client.connect({
            useSSL: true,
            userName: user,
            password: pass,
            onSuccess: () => { 
                document.getElementById("status").innerHTML = "Estado: Conectado a HiveMQ";
                document.getElementById("status").style.color = "#2ecc71";
            },
            onFailure: (e) => { 
                document.getElementById("status").innerHTML = "Error: " + e.errorMessage;
            }
        });

        function enviar(comando) {
            let message = new Paho.MQTT.Message(JSON.stringify({ cmd: comando }));
            message.destinationName = topic;
            client.send(message);
        }
    </script>
</body>
</html>

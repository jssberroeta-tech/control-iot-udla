<!DOCTYPE html>
<html>
<head>
    <title>Control IoT - UDLA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: Arial; text-align: center; background: #f4f4f4; }
        .btn { padding: 15px 25px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; }
        .on { background: #2ecc71; color: white; }
        .off { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <h1>Panel de Control ESP32</h1>
    <div id="status">Conectando...</div>
    
    <hr>
    <h3>LED 1 (D18)</h3>
    <button class="btn on" onclick="enviar('led1_on')">Encender</button>
    <button class="btn off" onclick="enviar('led1_off')">Apagar</button>

    <h3>LED 2 (D23)</h3>
    <button class="btn on" onclick="enviar('led2_on')">Encender</button>
    <button class="btn off" onclick="enviar('led2_off')">Apagar</button>

    <script>
        // Configuración de HiveMQ
        const broker = "15aee4ce7ff046d69f5f4fb4d2901c92.s1.eu.hivemq.cloud";
        const port = 8884; // Puerto WSS para Web
        const topic = "udla/iot/grupoX/cmd";

        client = new Paho.MQTT.Client("wss://" + broker + ":" + port + "/mqtt", "web_client_" + Math.random());

        client.connect({
            useSSL: true,
            userName: "jesus+", // El mismo de HiveMQ
            password: "Jesu#42006", 
            onSuccess: () => { document.getElementById("status").innerHTML = "Conectado al Broker"; }
        });

        function enviar(comando) {
            let payload = JSON.stringify({ cmd: comando });
            let message = new Paho.MQTT.Message(payload);
            message.destinationName = topic;
            client.send(message);
        }
    </script>
</body>
</html>
